version: "3"

env:
  MISE_CONFIG_FILE: .config/mise.toml
  LEFTHOOK_CONFIG: .config/lefthook.yml

tasks:
  bootstrap:
    desc: Install all tools and activate git hooks
    cmds:
      - mise install
      - lefthook install

  dev:
    desc: Run with hot reload
    cmds:
      - air -c .config/air.toml

  lint:
    desc: Run linters
    cmds:
      - golangci-lint run --config .config/golangci.yml

  test:
    desc: Run tests
    cmds:
      - go test -race ./...

  build:
    desc: Build binary
    cmds:
      - go build -o bin/bb ./cmd/cli

  generate:clients:
    desc: Regenerate Go clients from the committed OpenAPI specs (ADR-009)
    preconditions:
      - sh: test -d ../bookie-breaker-docs
        msg: bookie-breaker-docs must be cloned alongside this repo
    cmds:
      - go run github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.4.1
        --config .config/oapi-codegen-simulation.yml
        ../bookie-breaker-docs/api-contracts/openapi/simulation-engine.yaml
      - go run github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.4.1
        --config .config/oapi-codegen-prediction.yml
        ../bookie-breaker-docs/api-contracts/openapi/prediction-engine.yaml
      - go run github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.4.1
        --config .config/oapi-codegen-lines.yml
        ../bookie-breaker-docs/api-contracts/openapi/lines-service.yaml
      - go run github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.4.1
        --config .config/oapi-codegen-agent.yml
        ../bookie-breaker-docs/api-contracts/openapi/agent.yaml
      - go run github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.4.1
        --config .config/oapi-codegen-emulator.yml
        ../bookie-breaker-docs/api-contracts/openapi/bookie-emulator.yaml
      - go mod tidy
      - go build ./...
