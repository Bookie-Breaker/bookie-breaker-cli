coverage:
  round: down
  precision: 2
  status:
    project:
      default:
        target: 85%
        threshold: 0.5%
    patch:
      default:
        target: 85%
        threshold: 5%

ignore:
  - internal/client

comment:
  layout: "condensed_header, diff, files"
  behavior: default
  require_changes: true
